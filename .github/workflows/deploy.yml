name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p deploy-package/tmp
          cp -r .next/standalone/* deploy-package/
          cp -r .next/standalone/.next deploy-package/.next 2>/dev/null || true
          cp -r .next/static deploy-package/.next/static
          cp -r public deploy-package/public
          cp deploy/restart-webhook.php deploy-package/restart-webhook.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./deploy-package/
          server-dir: ./portal.uniqueanalyse.com/
          dangerous-clean-slate: false

      - name: Restart App
        run: |
          response=$(curl -sk -X POST \
            "https://portal.uniqueanalyse.com/restart-webhook.php?key=${{ secrets.RESTART_SECRET }}" \
            -d "commit=${GITHUB_SHA:0:7}" \
            -w "\nHTTP_CODE:%{http_code}" 2>&1)
          http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d: -f2)
          body=$(echo "$response" | grep -v "HTTP_CODE:")
          echo "Response: $body"
          echo "HTTP Code: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Auto-restart failed (HTTP $http_code). Restart manually from cPanel."
          fi
