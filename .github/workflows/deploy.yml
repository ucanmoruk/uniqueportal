name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p deploy-package/tmp
          cp -r .next/standalone/* deploy-package/
          cp -r .next/standalone/.next deploy-package/.next 2>/dev/null || true
          cp -r .next/static deploy-package/.next/static
          cp -r public deploy-package/public

          # Shared hosting icin server.js optimizasyonu:
          # cpus degerini 2'ye dusur (CloudLinux thread limitleri)
          sed -i 's/"cpus":[0-9]*/"cpus":2/g' deploy-package/server.js
          # imgOptConcurrency null ise 1 yap
          sed -i 's/"imgOptConcurrency":null/"imgOptConcurrency":1/g' deploy-package/server.js
          # staticGenerationMaxConcurrency dusur
          sed -i 's/"staticGenerationMaxConcurrency":[0-9]*/"staticGenerationMaxConcurrency":2/g' deploy-package/server.js
          # preloadEntriesOnStart kapat (startup sirasinda fazla process acmasin)
          sed -i 's/"preloadEntriesOnStart":true/"preloadEntriesOnStart":false/g' deploy-package/server.js

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./deploy-package/
          server-dir: ./home/uniqueanalyse/portal.uniqueanalyse.com/
          dangerous-clean-slate: false
          exclude: |
            .git*
            .git*/**

      - name: Post-deploy notice
        run: |
          echo "✅ Dosyalar deploy edildi."
          echo "⚠️  cPanel > Setup Node.js App > RESTART butonuna basın."
          echo "   (Shared hosting'te otomatik restart desteklenmiyor)"
